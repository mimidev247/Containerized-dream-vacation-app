name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'frontend/**'       # Triggers only when frontend files change
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'frontend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Linter (ESLint)
        run: |
          cd frontend
          npm run lint --if-present

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME }}
          password: ${{secrets.DOCKER_TOKEN }}

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{secrets.DOCKER_USERNAME }}/dream-vacations-frontend:latest
            ${{secrets.DOCKER_USERNAME }}/dream-vacations-frontend:${{ github.sha }}