version: '3.8'

services:
  # 1. Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: dream_vacation_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-dream_vacation}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  # 2. Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dream_vacation_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-dream_vacation}
      - PORT=5000
    depends_on:
      - db
    networks:
      - app-network

  # 3. Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dream_vacation_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

# Named volume for database data persistence
volumes:
  pgdata:

# Custom bridge network for communication using service names
networks:
  app-network:
    driver: bridge
